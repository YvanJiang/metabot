version: "3.8"

services:
  metabot:
    build: .
    restart: unless-stopped
    ports:
      - "${API_PORT:-9100}:9100"
    env_file: .env
    environment:
      - META_MEMORY_URL=http://localhost:8100
      - MEMORY_ENABLED=true
      - MEMORY_PORT=8100
      - MEMORY_DATABASE_DIR=/app/data
    volumes:
      # Persist MetaMemory database
      - metabot-data:/app/data
      # Persist Codex auth (run `codex login` inside container first)
      - codex-config:/root/.codex
      # Mount working directory for Codex to operate on
      - ${CODEX_DEFAULT_WORKING_DIRECTORY:-.}:/workspace
    working_dir: /app

volumes:
  metabot-data:
  codex-config:
